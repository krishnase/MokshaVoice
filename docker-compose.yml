version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mokshavoice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mokshavoice
      POSTGRES_USER: mokshavoice
      POSTGRES_PASSWORD: mokshavoice_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mokshavoice -d mokshavoice']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mokshavoice_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_dev_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_dev_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
